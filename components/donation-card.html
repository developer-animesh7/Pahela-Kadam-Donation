<div class="card card-donation reveal-scale" style="background-color: var(--bg-surface);">
  <!-- Top header indicating trust -->
  <div class="d-flex flex-between" style="margin-bottom: var(--space-4); border-bottom: 1px solid var(--border-light); padding-bottom: var(--space-3);">
    <span class="font-bold" style="font-size: var(--text-base); color: var(--primary);">Secure Donation</span>
    <div class="badge-trust badge-trust-verified">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="color: var(--success); margin-right: 2px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
      <span>Tax Exempt (80G)</span>
    </div>
  </div>

  <!-- Donation Interval Toggle -->
  <div class="donation-type-toggle">
    <button type="button" class="donation-toggle-btn is-active" data-type="monthly">Sponsor Monthly</button>
    <button type="button" class="donation-toggle-btn" data-type="once">Give Once</button>
  </div>

  <!-- Select Preset Amount -->
  <div style="margin-bottom: var(--space-2);">
    <label style="font-size: var(--text-xs); font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-bottom: var(--space-2); display: block;">Select Amount (₹)</label>
    <div class="donation-presets">
      <button type="button" class="preset-btn" data-value="1500">₹1.5k</button>
      <button type="button" class="preset-btn is-selected" data-value="3000">₹3k</button>
      <button type="button" class="preset-btn" data-value="6000">₹6k</button>
      <button type="button" class="preset-btn" data-value="15000">₹15k</button>
    </div>
  </div>

  <!-- Custom Input box -->
  <div class="custom-donation-input-wrap">
    <span class="custom-donation-currency">₹</span>
    <input type="number" class="custom-donation-input" value="3000" min="100" placeholder="Other Amount" aria-label="Custom donation amount in rupees">
  </div>

  <!-- Live Storytelling / Impact translation output box -->
  <div class="donation-impact-translation">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink: 0;"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
    <span class="donation-impact-text" style="transition: opacity var(--transition-fast);">
      Provides 1 complete physical therapy and sensory motor session.
    </span>
  </div>

  <!-- Core CTA Submit Button -->
  <button type="button" class="btn btn-primary btn-submit-donation" style="width: 100%; padding: 0.95rem; font-size: var(--text-sm); border-radius: var(--radius-lg);">
    Start Monthly Sponsorship
  </button>

  <!-- Checkout security seals -->
  <div class="d-flex flex-center" style="margin-top: var(--space-4); gap: var(--space-2); font-size: 11px; color: var(--text-muted);">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    <span>Secure, audited payment processing</span>
  </div>
</div>
